# Nginx site for the LoL Predictor Survey on esportsresearch.quest.
#
# Serves the static frontend build and proxies /api to uvicorn on the same
# origin. This is why the app needs no CORS configuration and no API base URL:
# the browser only ever calls relative paths like /api/responses.
#
# ---------------------------------------------------------------------------
# THIS FILE REPLACES THE EXISTING SITE at
# /etc/nginx/sites-available/lolstudy, which currently proxies ALL of `/` to
# 127.0.0.1:8000 for the books demo. Replacing it is what switches the domain
# from the demo to the survey.
#
# Back up the current file before overwriting so the change is reversible:
#   sudo cp /etc/nginx/sites-available/lolstudy \
#           /etc/nginx/sites-available/lolstudy.bak.$(date +%F-%H%M)
#
# Install:
#   sudo cp /home/deployer/lolstudy/deploy/nginx.conf \
#           /etc/nginx/sites-available/lolstudy
#   sudo nginx -t && sudo systemctl reload nginx
#
# Rollback:
#   sudo cp /etc/nginx/sites-available/lolstudy.bak.<STAMP> \
#           /etc/nginx/sites-available/lolstudy
#   sudo nginx -t && sudo systemctl reload nginx
#
# The symlink /etc/nginx/sites-enabled/lolstudy already exists and does not
# need to be recreated.
#
# TLS: the certificate for esportsresearch.quest + www is already issued and
# on auto-renewal via certbot.timer. The ssl_* lines below are the ones
# Certbot wrote; do not hand-edit them.
# ---------------------------------------------------------------------------

server {
    server_name esportsresearch.quest www.esportsresearch.quest;

    root /home/deployer/lolstudy/frontend/dist;
    index index.html;

    # Submissions are small JSON; nothing is uploaded.
    client_max_body_size 1m;

    # The dataset is ~21 MB of JSON and compresses heavily.
    gzip on;
    gzip_types application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_vary on;

    # Hashed build assets are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The public survey dataset. Label-free by construction: no winner, no
    # outcome, no Riot match ID.
    location = /survey_cases.json {
        expires 1h;
        add_header Cache-Control "public";
    }

    # API -> uvicorn, loopback only. proxy_pass without a trailing path keeps
    # the /api prefix intact, which is what the FastAPI routes expect
    # (@app.get("/api/health"), @app.post("/api/responses")).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Single-page app: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Defence in depth: never serve the private answer key, a research export,
    # or an environment file, even if one is mistakenly copied under the web
    # root. Returns 404 rather than 403 so the path is not confirmed to exist.
    location ~ ^/(case_outcomes\.json|.*\.csv|\.env) {
        deny all;
        return 404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/esportsresearch.quest/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/esportsresearch.quest/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.esportsresearch.quest) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = esportsresearch.quest) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name esportsresearch.quest www.esportsresearch.quest;
    return 404; # managed by Certbot
}
